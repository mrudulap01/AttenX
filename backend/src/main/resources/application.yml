server:
  port: 8080

spring:
  application:
    name: attenx-backend
    
management:
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
  
  datasource:
    url: jdbc:postgresql://localhost:5432/attenx_db
    username: attenx_user
    password: attenx_password
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:test@example.com}
    password: ${MAIL_PASSWORD:secret}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expirationMs: 900000 # 15 minutes
  refreshExpirationMs: 604800000 # 7 days
